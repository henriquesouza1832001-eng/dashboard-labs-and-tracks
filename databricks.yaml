bundle:
  name: dashboard-labs-and-tracks

resources:
  apps:
    dashboard_labs_and_tracks:
      name: dashboard-labs-and-tracks
      source_code_path: .
      resources:
        - name: DATABRICKS_TOKEN
          secret:
            scope: dashboard-secrets
            key: DATABRICKS_TOKEN
            permission: READ
        - name: JWT_SECRET
          secret:
            scope: dashboard-secrets
            key: JWT_SECRET
            permission: READ

targets:
  prod:
    mode: production
    workspace:
      host: ${var.DATABRICKS_HOST}
      root_path: /Workspace/Users/${var.DATABRICKS_USER}/.bundle/${bundle.name}/${bundle.target}