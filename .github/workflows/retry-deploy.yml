name: Retry Stuck Deploy

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:
  check-and-retry:
    runs-on: ubuntu-latest
    steps:
      - name: Check for stuck deploy runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          THRESHOLD_MINUTES=5
          NOW=$(date -u +%s)

          RUNS=$(gh api "repos/$REPO/actions/workflows/deploy.yml/runs?status=queued" --jq '.workflow_runs[] | [.id, .created_at] | @tsv')

          if [ -z "$RUNS" ]; then
            echo "Nenhum run travado na fila."
            exit 0
          fi

          echo "$RUNS" | while IFS=$'\t' read -r RUN_ID CREATED_AT; do
            CREATED_TS=$(date -u -d "$CREATED_AT" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$CREATED_AT" +%s)
            AGE_MIN=$(( (NOW - CREATED_TS) / 60 ))
            echo "Run $RUN_ID está na fila há $AGE_MIN minuto(s)."

            if [ "$AGE_MIN" -ge "$THRESHOLD_MINUTES" ]; then
              echo "Run $RUN_ID excedeu o limite de $THRESHOLD_MINUTES min. Cancelando e reiniciando..."
              gh api -X POST "repos/$REPO/actions/runs/$RUN_ID/cancel" || true
              sleep 5
              gh api -X POST "repos/$REPO/actions/runs/$RUN_ID/rerun" || \
                gh workflow run deploy.yml --ref main
            fi
          done