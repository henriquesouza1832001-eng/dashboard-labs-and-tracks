name: Deploy to Databricks

on:
  push:
    branches: [main]

concurrency:
  group: deploy-databricks
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Upload source files to Workspace
        env:
          DATABRICKS_HOST: https://adb-5678659344564033.13.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks workspace import-dir . \
            /Workspace/Users/ta51230@stellantis.com/dashboard-labs-and-tracks \
            --overwrite \
            --exclude .git \
            --exclude .github \
            --exclude .databricks

      - name: Restart app
        env:
          DATABRICKS_HOST: https://adb-5678659344564033.13.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks apps restart dashboard-labs-and-tracks