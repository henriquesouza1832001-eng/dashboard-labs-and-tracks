name: Deploy to Databricks

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy app from Git
        env:
          DATABRICKS_HOST: https://adb-5678659344564033.13.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "source_code_path": "",
              "git_source": {
                "git_url": "https://github.com/henriquesouza1832001-eng/dashboard-labs-and-tracks",
                "git_provider": "gitHub",
                "git_branch": "main"
              }
            }' \
            "$DATABRICKS_HOST/api/2.0/apps/dashboard-labs-and-tracks/deployments"