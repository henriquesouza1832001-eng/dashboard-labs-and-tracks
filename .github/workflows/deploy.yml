name: Deploy to Databricks

on:
  push:
    branches: [main]

concurrency:
  group: deploy-databricks
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Remove app.yaml before upload
        run: rm -f app.yaml

      - name: Upload source files
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          rm -rf .databricks
          databricks workspace import-dir . \
            /Workspace/Users/${{ secrets.DATABRICKS_USER }}/dashboard-labs-and-tracks \
            --overwrite \
            --exclude app.yaml

      - name: Deploy app
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          rm -rf .databricks
          databricks apps deploy dashboard-labs-and-tracks \
            --source-code-path /Workspace/Users/${{ secrets.DATABRICKS_USER }}/dashboard-labs-and-tracks
