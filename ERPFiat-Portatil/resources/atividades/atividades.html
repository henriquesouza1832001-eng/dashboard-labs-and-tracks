<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atividades — ERP Fiat</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;--blue-mid:#2E5FA3;--blue-light:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#a371f7;--orange:#e3702a;--text:#e6edf3;--text-muted:#8b949e;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:48px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar a{display:flex;align-items:center;gap:6px;color:var(--text-muted);font-size:13px;text-decoration:none;}
.topbar a:hover{color:var(--text);}
.topbar-sep{color:var(--border);}
.topbar-title{font-size:13px;font-weight:600;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.save-status{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);}
.save-status .dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);}
.save-status.saved .dot{background:var(--green);}
.save-status.saving .dot{background:var(--yellow);animation:pulse 1s infinite;}
.save-status.nosave .dot{background:var(--text-muted);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;min-width:200px;}
.search-box svg{width:14px;height:14px;stroke:var(--text-muted);fill:none;stroke-width:2;flex-shrink:0;}
.search-box input{background:none;border:none;color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:150px;}
.filter-sel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:var(--font);font-size:12px;cursor:pointer;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:var(--font);cursor:pointer;background:var(--surface2);color:var(--text);transition:all 0.12s;white-space:nowrap;}
.btn:hover{border-color:var(--text-muted);}
.btn.primary{background:var(--blue-mid);border-color:var(--blue-mid);color:#fff;}
.btn.primary:hover{background:var(--blue-light);color:#0d1117;}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}
.view-toggle{display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;}
.view-btn{background:none;border:none;padding:5px 10px;border-radius:6px;color:var(--text-muted);cursor:pointer;font-size:12px;font-family:var(--font);display:flex;align-items:center;}
.view-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.view-btn.active{background:var(--blue-mid);color:#fff;}
/* TELA INÍCIO */
#tela-inicio{flex:1;display:none;align-items:center;justify-content:center;}
.inicio-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px 48px;text-align:center;max-width:440px;display:flex;flex-direction:column;gap:16px;}
.inicio-icon{width:56px;height:56px;background:rgba(163,113,247,0.15);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.inicio-icon svg{width:28px;height:28px;stroke:var(--purple);fill:none;stroke-width:1.5;}
.inicio-title{font-size:20px;font-weight:600;}
.inicio-sub{font-size:13px;color:var(--text-muted);}
/* KANBAN */
.kanban-wrap{flex:1;overflow-x:auto;padding:20px 24px;display:flex;gap:16px;}
.kanban-col{min-width:280px;max-width:320px;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 130px);}
.col-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.col-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
.col-dot{width:10px;height:10px;border-radius:50%;}
.col-count{font-family:var(--mono);font-size:11px;background:var(--surface2);padding:2px 7px;border-radius:10px;color:var(--text-muted);}
.col-cards{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.task-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.task-card:hover{border-color:var(--blue-light);transform:translateY(-1px);}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.tag{font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--mono);}
.tag.alta{background:rgba(248,81,73,0.15);color:var(--red);border:1px solid rgba(248,81,73,0.3);}
.tag.media{background:rgba(210,153,34,0.15);color:var(--yellow);border:1px solid rgba(210,153,34,0.3);}
.tag.baixa{background:rgba(63,185,80,0.15);color:var(--green);border:1px solid rgba(63,185,80,0.3);}
.tag.obra{background:rgba(46,95,163,0.15);color:var(--blue-light);border:1px solid rgba(46,95,163,0.3);}
.task-title{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.4;}
.task-desc{font-size:12px;color:var(--text-muted);margin-bottom:10px;line-height:1.5;display:-webkit-box;display:-moz-box;display:-ms-flexbox;display:block;line-clamp:2;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.task-footer{display:flex;align-items:center;justify-content:space-between;}
.task-resp{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);}
.task-avatar{width:22px;height:22px;border-radius:50%;background:var(--blue-mid);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;}
.task-prazo{font-family:var(--mono);font-size:10px;color:var(--text-muted);}
.task-prazo.vencido{color:var(--red);}
.task-prazo.hoje{color:var(--yellow);}
.add-card-btn{display:flex;align-items:center;gap:6px;padding:10px 12px;color:var(--text-muted);background:none;border:1px dashed var(--border);border-radius:8px;cursor:pointer;font-size:12px;font-family:var(--font);transition:all 0.12s;margin:0 12px 12px;width:calc(100% - 24px);}
.add-card-btn:hover{color:var(--text);border-color:var(--text-muted);}
.prog-mini{height:4px;background:var(--surface);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.prog-mini-fill{height:100%;background:var(--blue-light);border-radius:2px;}
/* LISTA */
.lista-wrap{flex:1;overflow-y:auto;padding:20px 24px;}
.lista-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.lista-table th{text-align:left;padding:10px 14px;color:var(--text-muted);font-size:11px;font-weight:500;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.04em;}
.lista-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.lista-table tr:hover td{background:rgba(255,255,255,0.02);cursor:pointer;}
.status-badge{font-size:10px;padding:3px 8px;border-radius:4px;font-family:var(--mono);}
.s-todo{background:rgba(139,148,158,0.15);color:var(--text-muted);border:1px solid var(--border);}
.s-doing{background:rgba(210,153,34,0.15);color:var(--yellow);border:1px solid rgba(210,153,34,0.3);}
.s-done{background:rgba(63,185,80,0.15);color:var(--green);border:1px solid rgba(63,185,80,0.3);}
.s-blocked{background:rgba(248,81,73,0.15);color:var(--red);border:1px solid rgba(248,81,73,0.3);}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-size:14px;font-weight:600;}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:2px 6px;}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px;}
.field label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:500;}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue-light);}
.field textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-footer{display:flex;gap:8px;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border);}
.modal-footer-right{display:flex;gap:8px;}
.field-err{font-size:11px;color:var(--red);}
.comentarios{border-top:1px solid var(--border);padding-top:16px;margin-top:4px;}
.comentarios-title{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.06em;}
.comentario{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.com-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.com-autor{font-size:11px;font-weight:600;color:var(--blue-light);}
.com-data{font-size:10px;color:var(--text-muted);font-family:var(--mono);}
.com-texto{font-size:12px;line-height:1.5;}
.com-input-row{display:flex;gap:8px;margin-top:8px;}
.com-input-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;}
.com-input-row input:focus{outline:none;border-color:var(--blue-light);}
</style>

<script>
'use strict';
const $ = id => document.getElementById(id);
const hoje = () => new Date().toISOString().slice(0,10);

let atividades = [];
let saveTimeout = null;
let editId = null;
let viewAtual = 'kanban';
const usuarioAtual = JSON.parse(sessionStorage.getItem('usuario-atual')||'null');
const usuarios = JSON.parse(localStorage.getItem('hub-usuarios')||'[]');

if(usuarioAtual) $('user-logado').textContent = '● ' + usuarioAtual.nome;
function setSaveStatus(s,txt){
  const el=$('save-status'); el.className='save-status '+s;
  $('save-txt').textContent=txt||s;
}
function carregarDeJSON(txt){
  try{
    const d=JSON.parse(txt);
    atividades=Array.isArray(d.atividades)?d.atividades:Array.isArray(d)?d:[];
    return true;
  }catch(e){ return false; }
}
async function salvarDados(){
  localStorage.setItem('hub-atividades', JSON.stringify(atividades));
  setSaveStatus('saved', 'cache local');
}
function agendarSalvamento(){
  setSaveStatus('saving','salvando…');
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(()=>salvarDados(),400);
}
async function abrirArquivo(){
  const path = await neuAbrirArquivo('Selecionar dados-atividades.json');
  if(!path) return false;
  const txt = await neuLerArquivo(path);
  if(!txt || !carregarDeJSON(txt)){ alert('Arquivo inválido.'); return false; }
  fileHandle = path;
  salvarPath('ativ', path);
  localStorage.setItem('hub-atividades', JSON.stringify(atividades));
  $('arquivo-nome').textContent = path.split(/[\\/]/).pop();
  setSaveStatus('saved','salvo');
  return true;
}
async function criarArquivo(){
  const path = await neuSalvarDialogo('dados-atividades.json');
  if(!path) return false;
  fileHandle = path;
  salvarPath('ativ', path);
  atividades = [];
  $('arquivo-nome').textContent = path.split(/[\\/]/).pop();
  await salvarDados();
  return true;
}
function aplicarFiltroURL(){
  const p = new URLSearchParams(location.search);
  const status = p.get('status');
  if(!status) return;
  const colId = { todo:'col-todo', doing:'col-doing', blocked:'col-blocked', done:'col-done' }[status];
  if(colId){
    setView('kanban');
    setTimeout(()=>{
      const el = document.getElementById(colId);
      if(el){
        el.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
        el.style.outline = '2px solid var(--blue-light)';
        setTimeout(()=> el.style.outline = '', 2500);
      }
    }, 150);
  }
}
function iniciarApp(){
  $('tela-inicio').style.display='none';
  $('toolbar-app').style.display='flex';
  popularFiltros();
  render();
  setView('kanban');
  aplicarFiltroURL();
}
function popularFiltros(){
  $('filtro-resp').innerHTML='<option value="">Todos os responsáveis</option>'+
    usuarios.map(u=>`<option value="${u.id}">${u.nome}</option>`).join('');
  $('a-resp').innerHTML='<option value="">—</option>'+
    usuarios.map(u=>`<option value="${u.id}">${u.nome}</option>`).join('');
  const obrasCache=JSON.parse(localStorage.getItem('obras-dados-cache')||'{}');
  const obras=obrasCache.obras||[];
  $('filtro-obra').innerHTML='<option value="">Todas as obras</option>'+
    obras.map(o=>`<option value="${o.cod}">${o.cod} — ${o.nome}</option>`).join('');
  $('a-obra').innerHTML='<option value="">—</option>'+
    obras.map(o=>`<option value="${o.cod}">${o.cod} — ${o.nome}</option>`).join('');
}
function filtradas(){
  const search=($('search').value||'').toLowerCase();
  const resp=$('filtro-resp').value;
  const obra=$('filtro-obra').value;
  const prior=$('filtro-prior').value;
  return atividades.filter(a=>
    (!search||a.titulo.toLowerCase().includes(search)||(a.desc||'').toLowerCase().includes(search))&&
    (!resp||a.responsavel===resp)&&
    (!obra||a.obra===obra)&&
    (!prior||a.prioridade===prior)
  );
}
function render(){ viewAtual==='kanban'?renderKanban():renderLista(); }
function renderKanban(){
  const lista=filtradas();
  ['todo','doing','blocked','done'].forEach(col=>{
    const cards=lista.filter(a=>a.status===col);
    $('cnt-'+col).textContent=cards.length;
    $('cards-'+col).innerHTML=cards.map(a=>cardHTML(a)).join('');
  });
}
function cardHTML(a){
  const resp=usuarios.find(u=>u.id===a.responsavel);
  const vencido=a.prazo&&a.prazo<hoje()&&a.status!=='done';
  const prazoHoje=a.prazo===hoje();
  const prioClass={Alta:'alta',Média:'media',Baixa:'baixa'}[a.prioridade]||'media';
  const tags=(a.tags||'').split(',').filter(Boolean).map(t=>`<span class="tag" style="background:rgba(163,113,247,0.1);color:var(--purple);border:1px solid rgba(163,113,247,0.2)">${t.trim()}</span>`).join('');
  return `<div class="task-card" onclick="abrirAtiv('${a.id}')">
    <div class="card-tags">
      <span class="tag ${prioClass}">${a.prioridade}</span>
      ${a.obra?`<span class="tag obra">${a.obra}</span>`:''}
      ${tags}
    </div>
    <div class="task-title">${a.titulo}</div>
    ${a.desc?`<div class="task-desc">${a.desc}</div>`:''}
    ${(a.progresso||0)>0?`<div class="prog-mini"><div class="prog-mini-fill" style="width:${a.progresso}%"></div></div>`:''}
    <div class="task-footer">
      <div class="task-resp">
        ${resp?`<div class="task-avatar">${resp.nome[0]}</div><span>${resp.nome.split(' ')[0]}</span>`:'<span style="color:var(--border)">—</span>'}
      </div>
      ${a.prazo?`<span class="task-prazo ${vencido?'vencido':prazoHoje?'hoje':''}">${a.prazo.split('-').reverse().join('/')}</span>`:''}
    </div>
  </div>`;
}
function renderLista(){
  const lista=filtradas();
  const statusMap={todo:'A Fazer',doing:'Em Andamento',blocked:'Bloqueado',done:'Concluído'};
  const badgeMap={todo:'s-todo',doing:'s-doing',blocked:'s-blocked',done:'s-done'};
  const prioClass={Alta:'alta',Média:'media',Baixa:'baixa'};
  $('lista-tbody').innerHTML=lista.length?lista.map(a=>{
    const resp=usuarios.find(u=>u.id===a.responsavel);
    const vencido=a.prazo&&a.prazo<hoje()&&a.status!=='done';
    return `<tr onclick="abrirAtiv('${a.id}')">
      <td><strong>${a.titulo}</strong>${a.tags?`<br><span style="font-size:10px;color:var(--text-muted)">${a.tags}</span>`:''}</td>
      <td><span class="status-badge ${badgeMap[a.status]||'s-todo'}">${statusMap[a.status]||a.status}</span></td>
      <td><span class="tag ${prioClass[a.prioridade]||'media'}" style="display:inline-block">${a.prioridade||'—'}</span></td>
      <td>${resp?resp.nome:'—'}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--blue-light)">${a.obra||'—'}</td>
      <td style="font-family:var(--mono);font-size:11px;color:${vencido?'var(--red)':'var(--text-muted)'}">${a.prazo?a.prazo.split('-').reverse().join('/'):'—'}</td>
      <td><button class="btn" style="padding:4px 8px;font-size:11px" onclick="event.stopPropagation();excluirAtiv('${a.id}')">Excluir</button></td>
    </tr>`;
  }).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:32px">Nenhuma atividade encontrada</td></tr>';
}
function setView(v){
  viewAtual=v;
  $('view-kanban').style.display=v==='kanban'?'flex':'none';
  $('view-lista').style.display=v==='lista'?'block':'none';
  $('btn-kanban').classList.toggle('active',v==='kanban');
  $('btn-lista').classList.toggle('active',v==='lista');
  render();
}
function novaAtividade(status='todo'){
  editId=null;
  $('modal-ativ-title').textContent='Nova Atividade';
  ['a-titulo','a-desc','a-tags'].forEach(id=>$(id).value='');
  $('a-status').value=status;
  $('a-prior').value='Média';
  $('a-resp').value=usuarioAtual?.id||'';
  $('a-obra').value='';
  $('a-prazo').value='';
  $('a-prog').value=0;
  $('a-err').textContent='';
  $('btn-excluir-ativ').style.display='none';
  $('secao-comentarios').style.display='none';
  $('modal-ativ').classList.add('open');
}
function abrirAtiv(id){
  const a=atividades.find(x=>x.id===id);
  if(!a)return;
  editId=id;
  $('modal-ativ-title').textContent='Editar Atividade';
  $('a-titulo').value=a.titulo;
  $('a-desc').value=a.desc||'';
  $('a-status').value=a.status;
  $('a-prior').value=a.prioridade||'Média';
  $('a-resp').value=a.responsavel||'';
  $('a-obra').value=a.obra||'';
  $('a-prazo').value=a.prazo||'';
  $('a-prog').value=a.progresso||0;
  $('a-tags').value=a.tags||'';
  $('a-err').textContent='';
  $('btn-excluir-ativ').style.display='flex';
  $('secao-comentarios').style.display='block';
  renderComentarios(a);
  $('modal-ativ').classList.add('open');
}
function renderComentarios(a){
  const coms=a.comentarios||[];
  $('lista-comentarios').innerHTML=coms.length?coms.map(c=>`
    <div class="comentario">
      <div class="com-header"><span class="com-autor">${c.autor}</span><span class="com-data">${c.data}</span></div>
      <div class="com-texto">${c.texto}</div>
    </div>`).join(''):'<div style="color:var(--text-muted);font-size:12px;margin-bottom:10px">Sem comentários ainda.</div>';
}
function adicionarComentario(){
  const texto=$('com-texto').value.trim();
  if(!texto||!editId)return;
  const a=atividades.find(x=>x.id===editId);
  if(!a)return;
  if(!a.comentarios)a.comentarios=[];
  a.comentarios.push({autor:usuarioAtual?.nome||'Anônimo',texto,data:new Date().toLocaleString('pt-BR')});
  agendarSalvamento();
  renderComentarios(a);
  $('com-texto').value='';
}
$('btn-salvar-ativ').onclick=()=>{
  const titulo=$('a-titulo').value.trim();
  if(!titulo){$('a-err').textContent='Título obrigatório.';return;}
  const obj={
    id:editId||(Date.now().toString(36)),
    titulo,desc:$('a-desc').value.trim(),
    status:$('a-status').value,prioridade:$('a-prior').value,
    responsavel:$('a-resp').value,obra:$('a-obra').value,
    prazo:$('a-prazo').value,progresso:parseInt($('a-prog').value)||0,
    tags:$('a-tags').value.trim(),
    criadoPor:usuarioAtual?.nome||'',
    criadoEm:editId?(atividades.find(x=>x.id===editId)?.criadoEm||hoje()):hoje(),
    comentarios:editId?(atividades.find(x=>x.id===editId)?.comentarios||[]):[]
  };
  if(editId){const i=atividades.findIndex(x=>x.id===editId);atividades[i]=obj;}
  else atividades.push(obj);
  agendarSalvamento();
  render();
  $('modal-ativ').classList.remove('open');
};
function excluirAtivAtual(){if(editId&&confirm('Excluir?')){excluirAtiv(editId);$('modal-ativ').classList.remove('open');}}
function excluirAtiv(id){atividades=atividades.filter(x=>x.id!==id);agendarSalvamento();render();}
['modal-ativ-close','modal-ativ-cancel'].forEach(id=>$(id).onclick=()=>$('modal-ativ').classList.remove('open'));
$('modal-ativ').onclick=e=>{if(e.target===$('modal-ativ'))$('modal-ativ').classList.remove('open');};
$('btn-nova').onclick=()=>novaAtividade();
['search','filtro-resp','filtro-obra','filtro-prior'].forEach(id=>{$(id).addEventListener('change',render);if(id==='search')$(id).addEventListener('input',render);});
$('btn-abrir-ativ').onclick=()=>iniciarApp();
$('btn-criar-ativ').onclick=()=>iniciarApp();

async function inicializarAtividades() {
  try {
    const r = await fetch('/api/atividades');
    const d = await r.json();
    atividades = d.atividades || [];
    setSaveStatus('saved', 'carregado');
  } catch(e) {
    atividades = [];
    setSaveStatus('nosave', 'erro ao carregar');
  }
  iniciarApp();
}
setTimeout(inicializarAtividades, 300);
</script>
</body>
</html>
