<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Controler — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="login.css" rel="stylesheet">
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">Controler</div>
  <div class="login-sub">ERP Facilities</div>
  <div class="login-box">
    <input id="inp-email" type="email" placeholder="E-mail" autocomplete="email">
    <input id="inp-senha" type="password" placeholder="Senha" autocomplete="current-password">
    <button id="btn-entrar">Entrar</button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>
<script src="login.js"></script>
</body>
</html>
