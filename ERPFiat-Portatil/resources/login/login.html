<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Controler — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="/login/login.css" rel="stylesheet">
<script>
const _m=document.createElement('link');
_m.rel='manifest';
_m.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify({
  name:'Controler — ERP Facilities',
  short_name:'Controler',
  start_url:'/',
  scope:'/',
  display:'standalone',
  background_color:'#0d1117',
  theme_color:'#161b22',
  icons:[
    {src:'/icons/icon-192.png',sizes:'192x192',type:'image/png',purpose:'any maskable'},
    {src:'/icons/icon-512.png',sizes:'512x512',type:'image/png',purpose:'any maskable'}
  ]
}));
document.head.appendChild(_m);
</script>
<meta name="theme-color" content="#161b22">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Controler">
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">Controler</div>
  <div class="login-sub">ERP Facilities</div>
  <div class="login-box">
    <input id="inp-email" type="email" placeholder="E-mail" autocomplete="email">
    <input id="inp-senha" type="password" placeholder="Senha" autocomplete="current-password">
    <button id="btn-entrar">Entrar</button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>
<script src="/hub/pwa.js"></script>
<script src="/login/login.js"></script>
</body>
</html>
