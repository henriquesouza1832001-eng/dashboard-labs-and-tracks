<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Service Desk</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="/servicedesk/servicedesk.css" rel="stylesheet">
</head>
<body>

<div class="topbar">
  <h1>Service Desk</h1>
  <span class="sub">Atendimento e cadastro de ID externo</span>
</div>

<div class="wrap">
  <div class="abas">
    <button class="aba-btn active" data-aba="abertos">Abertos</button>
    <button class="aba-btn" data-aba="andamento">Em Andamento</button>
  </div>

  <div class="filtros">
    <input type="text" id="sd-busca" placeholder="Buscar por título, local ou ID...">
    <select id="sd-filtro-data">
      <option value="todos">Todos os períodos</option>
      <option value="hoje">Hoje</option>
      <option value="semana">Esta semana</option>
      <option value="antigos">Mais antigos</option>
    </select>
    <label class="check-todos">
      <input type="checkbox" id="sd-ver-concluidos">
      Mostrar concluídos
    </label>
  </div>

  <div id="sd-lista"></div>
</div>

<div id="sd-toast" class="toast"></div>
<input type="file" id="sd-foto-input-galeria" accept="image/*" multiple style="display:none">
<input type="file" id="sd-foto-input-camera" accept="image/*" capture="environment" style="display:none">

<script src="/servicedesk/servicedesk.js"></script>
</body>
</html>
