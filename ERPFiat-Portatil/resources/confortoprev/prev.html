<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Preventiva — Conforto</title>
  <link rel="stylesheet" href="/conforto-prev/prev.css">
</head>
<body>
  <div class="topbar">
    <svg width="18" height="18" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="topbar-title">Registro de Preventiva</span>
  </div>

  <!-- TELA PRINCIPAL -->
  <div id="tela-form">
    <div class="card-uc" id="card-uc">
      <div class="uc-badge">AR-CONDICIONADO</div>
      <div class="uc-codigo" id="uc-codigo">—</div>
      <div class="uc-nome" id="uc-nome">Carregando...</div>
      <div class="uc-detail-row">
        <span id="uc-local">—</span>
        <span>·</span>
        <span id="uc-modelo">—</span>
      </div>
    </div>

    <div class="form-wrap">
      <div class="section-title">Técnico responsável</div>
      <div class="field">
        <label>Nome do técnico *</label>
        <input type="text" id="inp-tecnico" placeholder="Seu nome completo" autocomplete="name">
      </div>
      <div class="field">
        <label>Data da preventiva *</label>
        <input type="date" id="inp-data">
      </div>

      <div class="section-title" style="margin-top:24px">Checklist de verificação</div>
      <div id="checklist-wrap" class="checklist-wrap"></div>

      <div class="field" style="margin-top:20px">
        <label>Observações</label>
        <textarea id="inp-obs" rows="3" placeholder="Anote qualquer ocorrência ou ponto de atenção..."></textarea>
      </div>

      <div id="form-msg" class="form-msg" style="display:none"></div>
      <button class="btn-submit" id="btn-submit" onclick="enviar()">Registrar Preventiva</button>
    </div>
  </div>

  <!-- TELA SUCESSO -->
  <div id="tela-sucesso" style="display:none">
    <div class="sucesso-wrap">
      <div class="sucesso-icon">
        <svg width="32" height="32" fill="none" stroke="#1a7f4b" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="sucesso-titulo">Preventiva registrada!</div>
      <div class="sucesso-sub" id="sucesso-sub">Os dados foram salvos com sucesso.</div>
      <div class="sucesso-detalhe" id="sucesso-detalhe"></div>
    </div>
  </div>

  <script>
    const DADOS = window.__DADOS__ || {};
    const uc       = DADOS.uc || null;
    const checklist = DADOS.checklist || [];
    const ucId     = DADOS.uc_id || '';

    // Preenche card da UC
    document.getElementById('uc-codigo').textContent = uc?.codigo || ucId;
    document.getElementById('uc-nome').textContent   = uc?.nome   || 'Unidade não encontrada';
    document.getElementById('uc-local').textContent  = uc?.local  || '—';
    document.getElementById('uc-modelo').textContent = uc?.modelo || '—';
    if (uc?.categoria) {
      document.querySelector('.uc-badge').textContent = uc.categoria.toUpperCase();
    }

    // Preenche data padrão
    document.getElementById('inp-data').value = new Date().toISOString().slice(0, 10);

    // Renderiza checklist
    const wrap = document.getElementById('checklist-wrap');
    if (checklist.length) {
      wrap.innerHTML = checklist.map((item, i) => `
        <label class="check-item" for="cl-${i}">
          <input type="checkbox" id="cl-${i}" data-item="${item.replace(/"/g,'&quot;')}">
          <span class="check-box"></span>
          <span class="check-label">${item}</span>
        </label>
      `).join('');
    } else {
      wrap.innerHTML = '<div class="check-empty">Nenhum item de checklist configurado.</div>';
    }

    async function enviar() {
      const tecnico = document.getElementById('inp-tecnico').value.trim();
      const data    = document.getElementById('inp-data').value;
      const obs     = document.getElementById('inp-obs').value.trim();
      const msg     = document.getElementById('form-msg');

      if (!tecnico) { mostrarErro('Informe o nome do técnico.'); return; }
      if (!data)    { mostrarErro('Informe a data da preventiva.'); return; }

      const itens = [...document.querySelectorAll('#checklist-wrap input[type=checkbox]')].map(el => ({
        item: el.dataset.item,
        concluido: el.checked
      }));

      const agora = new Date();
      const dataHora = agora.toISOString();
      const body = {
        id: 'prev-qr-' + Date.now().toString(36),
        ucId,
        tecnico,
        dataPrevista:  data,
        dataRealizada: dataHora,
        status: 'Realizada',
        checklist: itens,
        obs
      };

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      msg.style.display = 'none';

      try {
        const res = await fetch('/api/conforto/preventivas', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error('Erro ' + res.status);
        const concluidos = itens.filter(i => i.concluido).length;
        const hora = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('sucesso-sub').textContent =
          `Técnico: ${tecnico} — ${data.split('-').reverse().join('/')} às ${hora}`;
        document.getElementById('sucesso-detalhe').textContent =
          `${concluidos} de ${itens.length} itens do checklist concluídos.`;
        document.getElementById('tela-form').style.display   = 'none';
        document.getElementById('tela-sucesso').style.display = 'block';
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Registrar Preventiva';
        mostrarErro('Falha ao enviar. Verifique a conexão e tente novamente.');
      }
    }

    function mostrarErro(txt) {
      const el = document.getElementById('form-msg');
      el.textContent = txt;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
